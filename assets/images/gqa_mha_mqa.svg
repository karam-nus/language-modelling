  <!-- Title -->
  <text x="390" y="22" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#6b7280" letter-spacing="1">MHA vs GQA vs MQA — KV HEAD CONFIGURATIONS</text>

  <!-- ── MHA panel ── -->
  <rect x="20" y="32" width="228" height="310" rx="6" fill="#111" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="134" y="52" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#3b82f6">Multi-Head Attention</text>
  <text x="134" y="66" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">h Q heads,  h K heads,  h V heads</text>

  <!-- MHA: 4 Q, 4 K, 4 V heads in columns -->
  <!-- Q heads row label -->
  <text x="32" y="89" font-family="monospace" font-size="9" fill="#3b82f6">Q</text>
