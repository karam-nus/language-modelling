<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" width="780" height="380" style="background:#111111;">
  <defs>
    <marker id="arrb" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrg" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arro" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrp" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="22" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#6b7280" letter-spacing="1">DATA PARALLEL vs TENSOR PARALLEL vs PIPELINE PARALLEL</text>

  <!-- ── Data Parallel ── -->
  <rect x="18" y="32" width="236" height="290" rx="6" fill="#111" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="136" y="52" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#3b82f6">Data Parallel (DDP)</text>

  <!-- 2 GPUs, each with full model -->
  <text x="136" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">Each GPU = full model copy,  different batch</text>

  <!-- GPU 0 -->
  <rect x="28" y="78" width="100" height="80" rx="4" fill="#0f1520" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="78" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">GPU 0</text>
  <rect x="36" y="103" width="84" height="16" rx="2" fill="#1a2a3a" stroke="#3b82f6" stroke-width="0.7"/>
  <text x="78" y="115" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#3b82f6">Full Model</text>
  <rect x="36" y="123" width="84" height="12" rx="2" fill="#0a1520" stroke="#555" stroke-width="0.7"/>
  <text x="78" y="133" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">Batch slice 0</text>
  <text x="78" y="152" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#22c55e">∇W₀</text>

  <!-- GPU 1 -->
  <rect x="138" y="78" width="100" height="80" rx="4" fill="#0f1520" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="188" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">GPU 1</text>
  <rect x="146" y="103" width="84" height="16" rx="2" fill="#1a2a3a" stroke="#3b82f6" stroke-width="0.7"/>
  <text x="188" y="115" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#3b82f6">Full Model</text>
  <rect x="146" y="123" width="84" height="12" rx="2" fill="#0a1520" stroke="#555" stroke-width="0.7"/>
  <text x="188" y="133" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">Batch slice 1</text>
  <text x="188" y="152" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#22c55e">∇W₁</text>

  <!-- All-reduce arrow -->
  <text x="136" y="180" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#f97316">All-Reduce  ∇W₀ + ∇W₁</text>
  <line x1="78" y1="170" x2="78" y2="188" stroke="#f97316" stroke-width="1.2"/>
  <line x1="78" y1="188" x2="195" y2="188" stroke="#f97316" stroke-width="1.2"/>
  <line x1="195" y1="188" x2="195" y2="170" stroke="#f97316" stroke-width="1.2"/>

  <text x="136" y="208" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">Syncs gradients after each step</text>
  <text x="136" y="222" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">Bandwidth: gradient size / step</text>

  <rect x="28" y="232" width="180" height="72" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="118" y="250" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">✓ Simple, scales data throughput</text>
  <text x="118" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">✓ Each GPU sees more data/step</text>
  <text x="118" y="278" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316">✗ Each GPU needs full model</text>
  <text x="118" y="292" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316">✗ Communication bottleneck</text>

  <!-- ── Tensor Parallel ── -->
  <rect x="272" y="32" width="236" height="290" rx="6" fill="#111" stroke="#a855f7" stroke-width="1.2"/>
  <text x="390" y="52" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#a855f7">Tensor Parallel (TP)</text>
  <text x="390" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">Each GPU = shard of model weights per layer</text>

  <!-- Weight matrix split across GPUs -->
  <!-- GPU 0: columns 0..d/2 -->
  <rect x="282" y="78" width="100" height="80" rx="4" fill="#170b2a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="332" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7">GPU 0</text>
  <rect x="290" y="103" width="84" height="16" rx="2" fill="#1a0a3a" stroke="#a855f7" stroke-width="0.7"/>
  <text x="332" y="115" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#a855f7">W[:, :d/2]</text>
  <rect x="290" y="123" width="84" height="12" rx="2" fill="#0a0514" stroke="#555" stroke-width="0.7"/>
  <text x="332" y="133" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">Same batch</text>
  <text x="332" y="152" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#a855f7">y₀ = x·W[:,0:d/2]</text>

  <!-- GPU 1: columns d/2..d -->
  <rect x="392" y="78" width="100" height="80" rx="4" fill="#170b2a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="442" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7">GPU 1</text>
  <rect x="400" y="103" width="84" height="16" rx="2" fill="#1a0a3a" stroke="#a855f7" stroke-width="0.7"/>
  <text x="442" y="115" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#a855f7">W[:, d/2:]</text>
  <rect x="400" y="123" width="84" height="12" rx="2" fill="#0a0514" stroke="#555" stroke-width="0.7"/>
  <text x="442" y="133" text-anchor="middle" font-family="monospace" font-size="7" fill="#555">Same batch</text>
  <text x="442" y="152" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#a855f7">y₁ = x·W[:,d/2:]</text>

  <!-- All-gather -->
  <text x="390" y="180" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#06b6d4">All-Gather  [y₀, y₁]</text>
  <line x1="332" y1="170" x2="332" y2="188" stroke="#06b6d4" stroke-width="1.2"/>
  <line x1="332" y1="188" x2="449" y2="188" stroke="#06b6d4" stroke-width="1.2"/>
  <line x1="449" y1="188" x2="449" y2="170" stroke="#06b6d4" stroke-width="1.2"/>

  <text x="390" y="208" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">Syncs activations every layer</text>
  <text x="390" y="222" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">Best within NVLink node</text>

  <rect x="282" y="232" width="180" height="72" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="372" y="250" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">✓ Enables larger models</text>
  <text x="372" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">✓ Splits memory per layer</text>
  <text x="372" y="278" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316">✗ All-gather every layer</text>
  <text x="372" y="292" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316">✗ Needs fast inter-GPU links</text>

  <!-- ── Pipeline Parallel ── -->
  <rect x="526" y="32" width="236" height="290" rx="6" fill="#111" stroke="#f97316" stroke-width="1.2"/>
  <text x="644" y="52" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#f97316">Pipeline Parallel (PP)</text>
  <text x="644" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">Each GPU = different layers  (pipeline stages)</text>

  <!-- Layers split -->
  <rect x="536" y="78" width="216" height="20" rx="3" fill="#1c0e00" stroke="#f97316" stroke-width="1"/>
  <text x="644" y="92" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#f97316">GPU 0  Layers 1–8</text>
  <rect x="536" y="103" width="216" height="20" rx="3" fill="#1a1400" stroke="#eab308" stroke-width="1"/>
  <text x="644" y="117" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#eab308">GPU 1  Layers 9–16</text>
  <rect x="536" y="128" width="216" height="20" rx="3" fill="#0a1a0a" stroke="#22c55e" stroke-width="1"/>
  <text x="644" y="142" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#22c55e">GPU 2  Layers 17–24</text>
  <rect x="536" y="153" width="216" height="20" rx="3" fill="#0f1520" stroke="#3b82f6" stroke-width="1"/>
  <text x="644" y="167" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#3b82f6">GPU 3  Layers 25–32</text>

  <!-- Arrows between -->
  <line x1="644" y1="98" x2="644" y2="103" stroke="#f97316" stroke-width="1.3" marker-end="url(#arro)"/>
  <line x1="644" y1="123" x2="644" y2="128" stroke="#eab308" stroke-width="1.3"/>
  <line x1="644" y1="148" x2="644" y2="153" stroke="#22c55e" stroke-width="1.3"/>

  <!-- Micro-batches -->
  <text x="644" y="194" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#06b6d4">Micro-batches fill the pipeline</text>

  <!-- Pipeline bubble -->
  <text x="644" y="210" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">Pipeline "bubble" ≈ (stages−1)/stages</text>
  <text x="644" y="224" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">of compute wasted</text>

  <rect x="536" y="232" width="180" height="72" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="626" y="250" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">✓ Minimal communication</text>
  <text x="626" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">✓ Works across slow links</text>
  <text x="626" y="278" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316">✗ Pipeline bubble overhead</text>
  <text x="626" y="292" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316">✗ Requires careful load balance</text>

  <!-- 3D parallelism note -->
  <rect x="18" y="336" width="744" height="34" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="390" y="351" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#ccc">Production training (GPT-4, LLaMA-3) uses all three simultaneously: 3D Parallelism</text>
  <text x="390" y="364" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">e.g. TP=8 (within node) × PP=4 (across nodes) × DP=N (across DP replicas)</text>
</svg>
