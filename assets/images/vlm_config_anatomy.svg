<svg viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono',monospace">
  <rect width="860" height="500" fill="#111111"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="bold">VLM Config Anatomy — Qwen3-VL Style</text>
  <text x="430" y="50" text-anchor="middle" fill="#94a3b8" font-size="10">config.json contains nested sub-configs for each modality</text>

  <!-- ===== Root config.json box ===== -->
  <rect x="20" y="62" width="820" height="420" rx="8" fill="#1e2030" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="430" y="83" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold">config.json  (root)</text>

  <!-- Text / LLM block -->
  <rect x="40" y="92" width="240" height="375" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="160" y="110" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">text_config  (LLM)</text>
  <text x="60" y="128" fill="#94a3b8" font-size="9">model_type: "qwen3"</text>
  <text x="60" y="144" fill="#f8fafc" font-size="9">hidden_size: 3584</text>
  <text x="60" y="160" fill="#f8fafc" font-size="9">num_hidden_layers: 28</text>
  <text x="60" y="176" fill="#f8fafc" font-size="9">num_attention_heads: 28</text>
  <text x="60" y="192" fill="#f8fafc" font-size="9">num_key_value_heads: 4</text>
  <text x="60" y="208" fill="#ef4444" font-size="9" font-weight="bold">head_dim: 128  ← override!</text>
  <text x="60" y="224" fill="#f8fafc" font-size="9">intermediate_size: 18944</text>
  <text x="60" y="240" fill="#f8fafc" font-size="9">max_position_embeddings: 32768</text>
  <text x="60" y="256" fill="#f8fafc" font-size="9">rope_theta: 1000000.0</text>
  <text x="60" y="272" fill="#f8fafc" font-size="9">rms_norm_eps: 1e-06</text>
  <text x="60" y="288" fill="#f8fafc" font-size="9">vocab_size: 151936</text>
  <text x="60" y="304" fill="#f8fafc" font-size="9">hidden_act: "silu"</text>
  <text x="60" y="320" fill="#94a3b8" font-size="9">tie_word_embeddings: false</text>
  <text x="60" y="336" fill="#94a3b8" font-size="9">use_sliding_window: false</text>
  <text x="60" y="352" fill="#94a3b8" font-size="9">use_cache: true</text>
  <rect x="50" y="362" width="220" height="96" rx="4" fill="#0a0f1e" stroke="#22c55e" stroke-width="0.6"/>
  <text x="160" y="378" text-anchor="middle" fill="#94a3b8" font-size="9">rope_scaling</text>
  <text x="70" y="393" fill="#f8fafc" font-size="9">type: "mrope"</text>
  <text x="70" y="408" fill="#f8fafc" font-size="9">mrope_section: [16,24,24]</text>
  <text x="70" y="424" fill="#94a3b8" font-size="9">  ↑ text / height / width</text>
  <text x="70" y="440" fill="#f8fafc" font-size="9">  splits for multimodal RoPE</text>
  <text x="70" y="452" fill="#f97316" font-size="8">sum must equal head_dim/2 = 64</text>

  <!-- Vision config block -->
  <rect x="300" y="92" width="255" height="375" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="427" y="110" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="bold">vision_config  (ViT encoder)</text>
  <text x="318" y="128" fill="#94a3b8" font-size="9">model_type: "qwen3_vl_vision"</text>
  <text x="318" y="144" fill="#f8fafc" font-size="9">depth: 32  (ViT transformer layers)</text>
  <text x="318" y="160" fill="#f8fafc" font-size="9">embed_dim: 1280  (vision d_model)</text>
  <text x="318" y="176" fill="#f8fafc" font-size="9">num_heads: 16  (vision attn heads)</text>
  <text x="318" y="192" fill="#f8fafc" font-size="9">image_size: 448  (max image side)</text>
  <text x="318" y="208" fill="#f8fafc" font-size="9">patch_size: 14  (spatial patch)</text>
  <text x="318" y="224" fill="#f8fafc" font-size="9">temporal_patch_size: 2  (video)</text>
  <text x="318" y="240" fill="#f8fafc" font-size="9">spatial_merge_size: 2</text>
  <text x="318" y="256" fill="#f8fafc" font-size="9">in_channels: 3  (RGB)</text>
  <text x="318" y="272" fill="#f8fafc" font-size="9">mlp_ratio: 4  (FFN multiplier)</text>
  <text x="318" y="288" fill="#f8fafc" font-size="9">hidden_act: "quick_gelu"</text>
  <text x="318" y="304" fill="#94a3b8" font-size="9">out_hidden_size: 3584</text>
  <text x="318" y="320" fill="#94a3b8" font-size="9">  ↑ must match text hidden_size</text>
  <rect x="318" y="332" width="225" height="60" rx="4" fill="#0a0f1e" stroke="#a855f7" stroke-width="0.6"/>
  <text x="430" y="348" text-anchor="middle" fill="#94a3b8" font-size="9">fullatt_block_indexes</text>
  <text x="328" y="364" fill="#f8fafc" font-size="9">[7, 15, 23, 31]</text>
  <text x="328" y="379" fill="#94a3b8" font-size="8">layers using FULL attention</text>
  <text x="328" y="392" fill="#94a3b8" font-size="8">(others use window attention)</text>
  <!-- token IDs -->
  <rect x="318" y="398" width="225" height="58" rx="4" fill="#0a0f1e" stroke="#a855f7" stroke-width="0.6"/>
  <text x="430" y="414" text-anchor="middle" fill="#94a3b8" font-size="9">special token IDs</text>
  <text x="328" y="430" fill="#f8fafc" font-size="9">image_token_id: 151655</text>
  <text x="328" y="445" fill="#f8fafc" font-size="9">video_token_id: 151656</text>
  <text x="328" y="460" fill="#f97316" font-size="8">⚠ collides if vocab extended</text>

  <!-- Root level fields -->
  <rect x="573" y="92" width="247" height="375" rx="6" fill="#0f172a" stroke="#f97316" stroke-width="1.2"/>
  <text x="696" y="110" text-anchor="middle" fill="#f97316" font-size="11" font-weight="bold">root-level fields</text>
  <text x="591" y="128" fill="#94a3b8" font-size="9">model_type: "qwen3_vl"</text>
  <text x="591" y="144" fill="#f8fafc" font-size="9">architectures: [Qwen3VLForConditional…]</text>
  <text x="591" y="160" fill="#f8fafc" font-size="9">torch_dtype: "bfloat16"</text>
  <text x="591" y="176" fill="#f8fafc" font-size="9">transformers_version: "4.x.x"</text>
  <text x="591" y="192" fill="#94a3b8" font-size="9">── generation config ──</text>
  <text x="591" y="208" fill="#f8fafc" font-size="9">bos_token_id: 151643</text>
  <text x="591" y="224" fill="#f8fafc" font-size="9">eos_token_id: [151645, 151643]</text>
  <text x="591" y="240" fill="#f8fafc" font-size="9">pad_token_id: 151643</text>
  <text x="591" y="256" fill="#94a3b8" font-size="9">── pipeline config ──</text>
  <text x="591" y="272" fill="#f8fafc" font-size="9">min_pixels: 256 * 28 * 28</text>
  <text x="591" y="288" fill="#f8fafc" font-size="9">max_pixels: 1280 * 28 * 28</text>
  <text x="591" y="304" fill="#94a3b8" font-size="8">  ↑ dynamic resolution bounds</text>
  <rect x="591" y="316" width="215" height="140" rx="4" fill="#0a0f1e" stroke="#f97316" stroke-width="0.6"/>
  <text x="698" y="332" text-anchor="middle" fill="#f97316" font-size="9">Shape derivations</text>
  <text x="601" y="350" fill="#94a3b8" font-size="8">n_patches_h = image_h / patch_size</text>
  <text x="601" y="365" fill="#94a3b8" font-size="8">n_patches_w = image_w / patch_size</text>
  <text x="601" y="380" fill="#94a3b8" font-size="8">n_tokens = n_patches_h * n_patches_w</text>
  <text x="601" y="395" fill="#94a3b8" font-size="8">          / (spatial_merge_size²)</text>
  <text x="601" y="412" fill="#f8fafc" font-size="8">→ merged into LLM context as</text>
  <text x="601" y="427" fill="#f8fafc" font-size="8">  image_token_id placeholder blocks</text>
  <text x="601" y="444" fill="#ef4444" font-size="8">⚠ n_tokens varies per image!</text>
</svg>
