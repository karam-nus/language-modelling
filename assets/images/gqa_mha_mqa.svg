  <rect x="285" y="265" width="196" height="64" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="383" y="283" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">Param overhead: low</text>
