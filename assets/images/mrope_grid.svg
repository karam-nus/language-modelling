<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360" style="background:#111111;">
  <defs>
    <linearGradient id="gradT" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1040;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradW" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14532d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbf7d0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#6b7280" letter-spacing="1">M-ROPE — MULTIMODAL POSITION ENCODING</text>
  <text x="350" y="38" text-anchor="middle" font-family="monospace" font-size="9" fill="#484f58">Temporal (t), Height (h), Width (w) axes assigned to different frequency bands</text>

  <!-- ── 1D Text RoPE (left panel) ── -->
  <g transform="translate(30, 60)">
    <text x="90" y="0" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">TEXT — 1D RoPE</text>
    <!-- tokens as boxes -->
    <rect x="0" y="12" width="40" height="28" rx="3" fill="#1a1a1a" stroke="#2a2a2a"/>
    <rect x="45" y="12" width="40" height="28" rx="3" fill="#1a1a1a" stroke="#2a2a2a"/>
    <rect x="90" y="12" width="40" height="28" rx="3" fill="#1a1a1a" stroke="#2a2a2a"/>
    <rect x="135" y="12" width="40" height="28" rx="3" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="20" y="30" text-anchor="middle" font-family="monospace" font-size="10" fill="#c9d1d9">t₀</text>
    <text x="65" y="30" text-anchor="middle" font-family="monospace" font-size="10" fill="#c9d1d9">t₁</text>
    <text x="110" y="30" text-anchor="middle" font-family="monospace" font-size="10" fill="#c9d1d9">t₂</text>
    <text x="155" y="30" text-anchor="middle" font-family="monospace" font-size="10" fill="#c9d1d9">t₃</text>
    <!-- 1D position bar -->
    <rect x="0" y="46" width="175" height="8" rx="2" fill="url(#gradT)"/>
    <text x="87" y="66" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">pos: 0 → 1 → 2 → 3</text>
    <!-- all dims get same θ -->
    <rect x="0" y="76" width="175" height="20" rx="3" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.3)"/>
    <text x="87" y="90" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">all d dims ← 1D pos</text>
  </g>

  <!-- separator -->
  <line x1="225" y1="55" x2="225" y2="300" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── 2D Image RoPE (middle panel) ── -->
  <g transform="translate(245, 60)">
    <text x="95" y="0" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">IMAGE — 2D RoPE</text>
    <!-- 3x3 image patch grid -->
    <g font-family="monospace" font-size="9">
      <!-- row 0 -->
      <rect x="0" y="12" width="54" height="34" rx="2" fill="#1a1a1a" stroke="#1e293b"/>
      <text x="27" y="25" text-anchor="middle" fill="#555">(h=0</text>
      <text x="27" y="37" text-anchor="middle" fill="#555">w=0)</text>
      <rect x="58" y="12" width="54" height="34" rx="2" fill="#1a1a1a" stroke="#1e293b"/>
      <text x="85" y="25" text-anchor="middle" fill="#555">(h=0</text>
      <text x="85" y="37" text-anchor="middle" fill="#555">w=1)</text>
      <rect x="116" y="12" width="54" height="34" rx="2" fill="#1a1a1a" stroke="#1e293b"/>
      <text x="143" y="25" text-anchor="middle" fill="#555">(h=0</text>
      <text x="143" y="37" text-anchor="middle" fill="#555">w=2)</text>
      <!-- row 1 -->
      <rect x="0" y="50" width="54" height="34" rx="2" fill="#1a1a1a" stroke="#1e293b"/>
      <text x="27" y="63" text-anchor="middle" fill="#555">(h=1</text>
      <text x="27" y="75" text-anchor="middle" fill="#555">w=0)</text>
      <rect x="58" y="50" width="54" height="34" rx="2" fill="#1a2a4a" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="85" y="63" text-anchor="middle" fill="#93c5fd">(h=1</text>
      <text x="85" y="75" text-anchor="middle" fill="#93c5fd">w=1)</text>
      <rect x="116" y="50" width="54" height="34" rx="2" fill="#1a1a1a" stroke="#1e293b"/>
      <text x="143" y="63" text-anchor="middle" fill="#555">(h=1</text>
      <text x="143" y="75" text-anchor="middle" fill="#555">w=2)</text>
      <!-- row 2 -->
      <rect x="0" y="88" width="54" height="34" rx="2" fill="#1a1a1a" stroke="#1e293b"/>
      <text x="27" y="101" text-anchor="middle" fill="#555">(h=2</text>
      <text x="27" y="113" text-anchor="middle" fill="#555">w=0)</text>
      <rect x="58" y="88" width="54" height="34" rx="2" fill="#1a1a1a" stroke="#1e293b"/>
      <text x="85" y="101" text-anchor="middle" fill="#555">(h=2</text>
      <text x="85" y="113" text-anchor="middle" fill="#555">w=1)</text>
      <rect x="116" y="88" width="54" height="34" rx="2" fill="#1a1a1a" stroke="#1e293b"/>
      <text x="143" y="101" text-anchor="middle" fill="#555">(h=2</text>
      <text x="143" y="113" text-anchor="middle" fill="#555">w=2)</text>
    </g>
    <!-- h-axis bar -->
    <rect x="175" y="12" width="8" height="110" rx="2" fill="url(#gradH)"/>
    <text x="191" y="65" text-anchor="start" font-family="monospace" font-size="9" fill="#a855f7">h</text>
    <!-- w-axis bar -->
    <rect x="0" y="128" width="170" height="8" rx="2" fill="url(#gradW)"/>
    <text x="85" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">w</text>
    <!-- dim split -->
    <rect x="0" y="158" width="82" height="20" rx="3" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.3)"/>
    <text x="41" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7">dims 0..d/2 ← h</text>
    <rect x="88" y="158" width="82" height="20" rx="3" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)"/>
    <text x="129" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e">dims d/2..d ← w</text>
  </g>

  <!-- separator -->
  <line x1="480" y1="55" x2="480" y2="300" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── 3D Video RoPE (right panel) ── -->
  <g transform="translate(495, 60)">
    <text x="100" y="0" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">VIDEO — 3D RoPE</text>
    <!-- 3 frames stacked -->
    <g font-family="monospace" font-size="9">
      <!-- frame 0 (back) -->
      <rect x="30" y="28" width="80" height="60" rx="2" fill="#0d1117" stroke="#21262d"/>
      <text x="70" y="60" text-anchor="middle" fill="#333">frame t=0</text>
      <!-- frame 1 (mid) -->
      <rect x="15" y="14" width="80" height="60" rx="2" fill="#111827" stroke="#1e293b"/>
      <text x="55" y="46" text-anchor="middle" fill="#444">frame t=1</text>
      <!-- frame 2 (front) -->
      <rect x="0" y="0" width="80" height="60" rx="2" fill="#1a1a1a" stroke="#2a2a2a"/>
      <text x="40" y="32" text-anchor="middle" fill="#8b949e">frame t=2</text>
      <!-- axes labels -->
      <text x="86" y="95" font-family="monospace" font-size="9" fill="#3b82f6">t →</text>
      <text x="0" y="75" font-family="monospace" font-size="9" fill="#a855f7">↓ h</text>
    </g>
    <!-- temporal axis bar -->
    <rect x="0" y="98" width="110" height="7" rx="2" fill="url(#gradT)"/>
    <text x="55" y="117" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">temporal (t)</text>
    <!-- dim split 3-way -->
    <rect x="0" y="130" width="60" height="20" rx="3" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)"/>
    <text x="30" y="144" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6">d/3 ← t</text>
    <rect x="64" y="130" width="60" height="20" rx="3" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.3)"/>
    <text x="94" y="144" text-anchor="middle" font-family="monospace" font-size="8" fill="#a855f7">d/3 ← h</text>
    <rect x="128" y="130" width="60" height="20" rx="3" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)"/>
    <text x="158" y="144" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">d/3 ← w</text>
  </g>

  <!-- Bottom formula bar -->
  <rect x="30" y="305" width="640" height="38" rx="4" fill="#1a1a1a" stroke="#2a2a2a"/>
  <text x="350" y="320" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#8b949e">RoPE(q, pos) = q · e^(i · pos · θ)   where θᵢ = 1 / base^(2i/d)</text>
  <text x="350" y="335" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#484f58">M-RoPE: each spatial/temporal axis encoded independently across distinct frequency bands</text>
</svg>
