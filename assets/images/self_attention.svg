<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" width="780" height="420" style="background:#111111;">
  <defs>
    <marker id="arrb" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrp" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arro" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrg" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrc" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="22" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#6b7280" letter-spacing="1">SCALED DOT-PRODUCT ATTENTION</text>

  <!-- Input sequence X -->
  <rect x="30" y="38" width="120" height="30" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="90" y="57" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#999">Input X</text>

  <!-- Three projection arrows -->
  <line x1="90" y1="68" x2="90" y2="84" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="90" y1="68" x2="200" y2="84" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="90" y1="68" x2="370" y2="84" stroke="#2a2a2a" stroke-width="1"/>

  <!-- WQ box -->
  <rect x="30" y="85" width="120" height="28" rx="4" fill="#0f1520" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="90" y="103" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#3b82f6">W_Q  projection</text>

  <!-- WK box -->
  <rect x="140" y="85" width="120" height="28" rx="4" fill="#1c0e00" stroke="#f97316" stroke-width="1.2"/>
  <text x="200" y="103" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#f97316">W_K  projection</text>

  <!-- WV box -->
  <rect x="310" y="85" width="120" height="28" rx="4" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="370" y="103" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#22c55e">W_V  projection</text>

  <!-- Q, K, V labels -->
  <line x1="90" y1="113" x2="90" y2="135" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrb)"/>
  <line x1="200" y1="113" x2="200" y2="135" stroke="#f97316" stroke-width="1.5" marker-end="url(#arro)"/>
  <line x1="370" y1="113" x2="370" y2="155" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrg)"/>

  <rect x="50" y="136" width="80" height="26" rx="4" fill="#0a0e1a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="90" y="153" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#3b82f6">Q</text>

  <rect x="160" y="136" width="80" height="26" rx="4" fill="#140a00" stroke="#f97316" stroke-width="1.2"/>
  <text x="200" y="153" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#f97316">K</text>

  <rect x="330" y="156" width="80" height="26" rx="4" fill="#071207" stroke="#22c55e" stroke-width="1.2"/>
  <text x="370" y="173" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#22c55e">V</text>

  <!-- QK^T matmul -->
  <line x1="90" y1="162" x2="90" y2="192" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="200" y1="162" x2="200" y2="192" stroke="#f97316" stroke-width="1.5"/>
  <line x1="90" y1="192" x2="135" y2="192" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="200" y1="192" x2="165" y2="192" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="150" y1="192" x2="150" y2="210" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrp)"/>

  <!-- Matmul label -->
  <text x="150" y="205" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">Q · Kᵀ</text>

  <!-- Scale box -->
  <rect x="80" y="211" width="140" height="28" rx="4" fill="#170b2a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="150" y="229" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#a855f7">÷ √d_k   (scale)</text>

  <!-- Optional mask -->
  <line x1="150" y1="239" x2="150" y2="257" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrp)"/>
  <rect x="80" y="258" width="140" height="28" rx="4" fill="#1a0a00" stroke="#f97316" stroke-width="1"/>
  <text x="150" y="276" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#f97316">+ causal mask</text>
  <text x="150" y="287" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#555">(−∞ for future tokens)</text>

  <!-- Softmax -->
  <line x1="150" y1="286" x2="150" y2="305" stroke="#f97316" stroke-width="1.5" marker-end="url(#arro)"/>
  <rect x="80" y="306" width="140" height="28" rx="4" fill="#0f1520" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="150" y="324" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#3b82f6">softmax  →  A</text>

  <!-- Final matmul with V -->
  <line x1="150" y1="334" x2="150" y2="352" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="370" y1="182" x2="370" y2="352" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="370" y1="352" x2="305" y2="352" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="150" y1="352" x2="175" y2="352" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="240" y1="352" x2="240" y2="372" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrg)"/>

  <text x="240" y="363" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">A · V</text>

  <!-- Output -->
  <rect x="160" y="373" width="160" height="30" rx="4" fill="#071207" stroke="#22c55e" stroke-width="1.2"/>
  <text x="240" y="393" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#22c55e">Output  [B, T, d_k]</text>

  <!-- Right panel: attention matrix visualization -->
  <text x="590" y="22" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280" letter-spacing="0.5">ATTENTION WEIGHTS  (4×4 example)</text>

  <!-- Attention matrix grid -->
  <text x="480" y="48" font-family="monospace" font-size="8.5" fill="#555">          to →</text>
  <text x="464" y="62" font-family="monospace" font-size="8.5" fill="#3b82f6">The</text>
  <text x="502" y="62" font-family="monospace" font-size="8.5" fill="#3b82f6">cat</text>
  <text x="540" y="62" font-family="monospace" font-size="8.5" fill="#3b82f6">sat</text>
  <text x="578" y="62" font-family="monospace" font-size="8.5" fill="#3b82f6">on</text>
  <text x="452" y="80" font-family="monospace" font-size="8" fill="#555">↓</text>
  <text x="440" y="80" font-family="monospace" font-size="8" fill="#555">from</text>

  <!-- Cell (The, The) -->
  <rect x="459" y="67" width="34" height="20" rx="2" fill="#1e3a5f" opacity="0.95"/>
  <text x="476" y="81" text-anchor="middle" font-family="monospace" font-size="8" fill="#93c5fd">0.62</text>

  <!-- Cell (The, cat) -->
  <rect x="497" y="67" width="34" height="20" rx="2" fill="#0f1f3d" opacity="0.5"/>
  <text x="514" y="81" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7fbf">0.20</text>

  <!-- Cell (The, sat) -->
  <rect x="535" y="67" width="34" height="20" rx="2" fill="#0d1929" opacity="0.3"/>
  <text x="552" y="81" text-anchor="middle" font-family="monospace" font-size="8" fill="#3060a0">0.11</text>

  <!-- Cell (The, on) -->
  <rect x="573" y="67" width="34" height="20" rx="2" fill="#090d14" opacity="0.2"/>
  <text x="590" y="81" text-anchor="middle" font-family="monospace" font-size="8" fill="#2a4878">0.07</text>

  <!-- Row 2: cat -->
  <text x="440" y="100" font-family="monospace" font-size="8.5" fill="#3b82f6">cat</text>
  <rect x="459" y="88" width="34" height="20" rx="2" fill="#1c0e00" opacity="0.6"/>
  <text x="476" y="102" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316" opacity="0.6">-∞</text>
  <rect x="497" y="88" width="34" height="20" rx="2" fill="#1e3a5f" opacity="0.95"/>
  <text x="514" y="102" text-anchor="middle" font-family="monospace" font-size="8" fill="#93c5fd">0.75</text>
  <rect x="535" y="88" width="34" height="20" rx="2" fill="#0f1929" opacity="0.35"/>
  <text x="552" y="102" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7fbf">0.15</text>
  <rect x="573" y="88" width="34" height="20" rx="2" fill="#090d14" opacity="0.15"/>
  <text x="590" y="102" text-anchor="middle" font-family="monospace" font-size="8" fill="#2a4878">0.10</text>

  <!-- Row 3: sat -->
  <text x="440" y="120" font-family="monospace" font-size="8.5" fill="#3b82f6">sat</text>
  <rect x="459" y="108" width="34" height="20" rx="2" fill="#1c0e00" opacity="0.6"/>
  <text x="476" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316" opacity="0.6">-∞</text>
  <rect x="497" y="108" width="34" height="20" rx="2" fill="#1c0e00" opacity="0.6"/>
  <text x="514" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316" opacity="0.6">-∞</text>
  <rect x="535" y="108" width="34" height="20" rx="2" fill="#1e3a5f" opacity="0.95"/>
  <text x="552" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#93c5fd">0.85</text>
  <rect x="573" y="108" width="34" height="20" rx="2" fill="#0f1929" opacity="0.3"/>
  <text x="590" y="122" text-anchor="middle" font-family="monospace" font-size="8" fill="#4a7fbf">0.15</text>

  <!-- Row 4: on -->
  <text x="440" y="140" font-family="monospace" font-size="8.5" fill="#3b82f6">on</text>
  <rect x="459" y="128" width="34" height="20" rx="2" fill="#1c0e00" opacity="0.6"/>
  <text x="476" y="142" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316" opacity="0.6">-∞</text>
  <rect x="497" y="128" width="34" height="20" rx="2" fill="#1c0e00" opacity="0.6"/>
  <text x="514" y="142" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316" opacity="0.6">-∞</text>
  <rect x="535" y="128" width="34" height="20" rx="2" fill="#1c0e00" opacity="0.6"/>
  <text x="552" y="142" text-anchor="middle" font-family="monospace" font-size="8" fill="#f97316" opacity="0.6">-∞</text>
  <rect x="573" y="128" width="34" height="20" rx="2" fill="#1e3a5f" opacity="0.95"/>
  <text x="590" y="142" text-anchor="middle" font-family="monospace" font-size="8" fill="#93c5fd">1.00</text>

  <!-- Causal mask legend -->
  <rect x="440" y="158" width="14" height="10" rx="2" fill="#1c0e00" stroke="#f97316" stroke-width="0.7"/>
  <text x="458" y="168" font-family="monospace" font-size="8" fill="#f97316">masked (−∞ → 0)</text>
  <rect x="440" y="173" width="14" height="10" rx="2" fill="#1e3a5f"/>
  <text x="458" y="183" font-family="monospace" font-size="8" fill="#93c5fd">high attention</text>
  <rect x="440" y="188" width="14" height="10" rx="2" fill="#0f1929"/>
  <text x="458" y="198" font-family="monospace" font-size="8" fill="#4a7fbf">low attention</text>

  <!-- Multi-head explanation -->
  <rect x="430" y="215" width="330" height="185" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="595" y="234" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280" letter-spacing="0.5">MULTI-HEAD ATTENTION</text>

  <!-- h heads side by side -->
  <rect x="438" y="242" width="50" height="22" rx="3" fill="#0f1520" stroke="#3b82f6" stroke-width="1"/>
  <text x="463" y="256" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#3b82f6">head₁</text>
  <rect x="494" y="242" width="50" height="22" rx="3" fill="#0f1520" stroke="#3b82f6" stroke-width="1"/>
  <text x="519" y="256" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#3b82f6">head₂</text>
  <text x="570" y="257" font-family="monospace" font-size="11" fill="#555">···</text>
  <rect x="598" y="242" width="50" height="22" rx="3" fill="#0f1520" stroke="#3b82f6" stroke-width="1"/>
  <text x="623" y="256" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#3b82f6">head_h</text>

  <!-- Each head dim -->
  <text x="595" y="279" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">each head: d_k = d_model / h</text>

  <!-- Concat -->
  <line x1="595" y1="284" x2="595" y2="298" stroke="#2a2a2a" stroke-width="1.5" marker-end="url(#arrb)"/>
  <rect x="505" y="299" width="180" height="22" rx="3" fill="#0f1520" stroke="#3b82f6" stroke-width="1"/>
  <text x="595" y="314" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">concat [B, T, h·d_k]</text>

  <!-- W_O projection -->
  <line x1="595" y1="321" x2="595" y2="338" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrb)"/>
  <rect x="505" y="339" width="180" height="22" rx="3" fill="#1a0a1a" stroke="#a855f7" stroke-width="1"/>
  <text x="595" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7">W_O projection → [B, T, d_model]</text>

  <text x="595" y="380" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">h=32 heads · d_k=128 → d_model=4096</text>
  <text x="595" y="393" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">(LLaMA-3-8B example)</text>
</svg>
