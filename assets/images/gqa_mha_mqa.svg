  <text x="644" y="240" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">1 KV head  (h=4 example)</text>
  <text x="644" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#06b6d4">¼ KV cache size vs MHA</text>

