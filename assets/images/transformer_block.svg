<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" width="780" height="460" style="background:#111111;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrg" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrgray" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="22" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#6b7280" letter-spacing="1">DECODER-ONLY TRANSFORMER BLOCK (PRE-NORM)</text>

  <!-- Left: single block diagram -->
  <!-- Input box -->
  <rect x="240" y="38" width="160" height="34" rx="5" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="320" y="59" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#999">Input  x</text>
  <text x="320" y="70" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">[B, T, d_model]</text>

  <!-- Arrow down -->
  <line x1="320" y1="72" x2="320" y2="90" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RMSNorm 1 -->
  <rect x="240" y="91" width="160" height="30" rx="5" fill="#0f1520" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="320" y="111" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#3b82f6">RMSNorm</text>

  <!-- Arrow -->
  <line x1="320" y1="121" x2="320" y2="140" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Self-Attention -->
  <rect x="220" y="141" width="200" height="34" rx="5" fill="#1e0a3c" stroke="#a855f7" stroke-width="1.2"/>
  <text x="320" y="161" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#a855f7">Self-Attention</text>
  <text x="320" y="172" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#7e22ce">[B, T, d_model] → [B, T, d_model]</text>

  <!-- Residual bypass line 1 -->
  <line x1="236" y1="55" x2="195" y2="55" stroke="#2a2a2a" stroke-width="1.3" stroke-dasharray="4,2"/>
  <line x1="195" y1="55" x2="195" y2="195" stroke="#2a2a2a" stroke-width="1.3" stroke-dasharray="4,2"/>
  <line x1="195" y1="195" x2="215" y2="195" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arrg)"/>

  <!-- Arrow to residual add 1 -->
  <line x1="320" y1="175" x2="320" y2="188" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Residual add 1 -->
  <circle cx="320" cy="196" r="10" fill="#111" stroke="#22c55e" stroke-width="1.5"/>
  <text x="320" y="200" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#22c55e">+</text>
  <text x="336" y="196" font-family="monospace" font-size="8" fill="#22c55e">residual</text>

  <!-- Arrow down -->
  <line x1="320" y1="206" x2="320" y2="222" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RMSNorm 2 -->
  <rect x="240" y="223" width="160" height="30" rx="5" fill="#0f1520" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="320" y="243" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#3b82f6">RMSNorm</text>

  <!-- Arrow -->
  <line x1="320" y1="253" x2="320" y2="270" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Feed-Forward -->
  <rect x="220" y="271" width="200" height="46" rx="5" fill="#1c0e00" stroke="#f97316" stroke-width="1.2"/>
  <text x="320" y="291" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#f97316">Feed-Forward (SwiGLU)</text>
  <text x="320" y="305" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#9a3412">d_model → 4×d_model → d_model</text>
  <text x="320" y="315" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">~67% of params per block</text>

  <!-- Residual bypass line 2 -->
  <line x1="416" y1="196" x2="455" y2="196" stroke="#2a2a2a" stroke-width="1.3" stroke-dasharray="4,2"/>
  <line x1="455" y1="196" x2="455" y2="347" stroke="#2a2a2a" stroke-width="1.3" stroke-dasharray="4,2"/>
  <line x1="455" y1="347" x2="435" y2="347" stroke="#22c55e" stroke-width="1.3" marker-end="url(#arrg)"/>

  <!-- Arrow to residual add 2 -->
  <line x1="320" y1="317" x2="320" y2="338" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Residual add 2 -->
  <circle cx="320" cy="347" r="10" fill="#111" stroke="#22c55e" stroke-width="1.5"/>
  <text x="320" y="351" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#22c55e">+</text>
  <text x="336" y="347" font-family="monospace" font-size="8" fill="#22c55e">residual</text>

  <!-- Arrow down -->
  <line x1="320" y1="357" x2="320" y2="375" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output box -->
  <rect x="240" y="376" width="160" height="34" rx="5" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="320" y="396" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#999">Output  x'</text>
  <text x="320" y="407" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">[B, T, d_model]</text>

  <!-- "× N blocks" label -->
  <rect x="225" y="428" width="190" height="24" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="320" y="444" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#555">× N blocks  (e.g. 32 for LLaMA-3-8B)</text>

  <!-- Right panel: model scale table -->
  <rect x="525" y="38" width="220" height="230" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="635" y="57" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280" letter-spacing="0.5">MODEL SCALE</text>

  <!-- Table header -->
  <rect x="526" y="62" width="218" height="20" rx="0" fill="#1a1a1a"/>
  <text x="558" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">Model</text>
  <text x="628" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">d_model</text>
  <text x="700" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">N</text>
  <text x="730" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">heads</text>

  <!-- Rows -->
  <text x="558" y="97" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#ccc">GPT-2 sm</text>
  <text x="628" y="97" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#a855f7">768</text>
  <text x="700" y="97" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#f97316">12</text>
  <text x="730" y="97" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#22c55e">12</text>

  <text x="558" y="114" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#ccc">GPT-2 xl</text>
  <text x="628" y="114" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#a855f7">1600</text>
  <text x="700" y="114" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#f97316">48</text>
  <text x="730" y="114" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#22c55e">25</text>

  <text x="558" y="131" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#ccc">LLaMA-3 8B</text>
  <text x="628" y="131" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#a855f7">4096</text>
  <text x="700" y="131" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#f97316">32</text>
  <text x="730" y="131" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#22c55e">32</text>

  <text x="558" y="148" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#ccc">LLaMA-3 70B</text>
  <text x="628" y="148" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#a855f7">8192</text>
  <text x="700" y="148" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#f97316">80</text>
  <text x="730" y="148" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#22c55e">64</text>

  <text x="558" y="165" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#ccc">LLaMA-3 405B</text>
  <text x="628" y="165" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#a855f7">16384</text>
  <text x="700" y="165" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#f97316">126</text>
  <text x="730" y="165" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#22c55e">128</text>

  <!-- Divider -->
  <line x1="526" y1="175" x2="744" y2="175" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Parameter count note -->
  <text x="635" y="193" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#6b7280">Params ≈ 12 · N · d²_model</text>
  <text x="635" y="208" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#6b7280">(approximate, ignoring embeddings)</text>

  <!-- Right panel 2: key equations -->
  <rect x="525" y="285" width="220" height="170" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="635" y="304" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280" letter-spacing="0.5">KEY OPERATIONS</text>

  <text x="535" y="322" font-family="monospace" font-size="8.5" fill="#3b82f6">RMSNorm:</text>
  <text x="535" y="335" font-family="monospace" font-size="8.5" fill="#ccc">  x / RMS(x) · γ</text>
  <text x="535" y="350" font-family="monospace" font-size="8.5" fill="#a855f7">Attention:</text>
  <text x="535" y="363" font-family="monospace" font-size="8.5" fill="#ccc">  softmax(QKᵀ/√d_k)V</text>
  <text x="535" y="378" font-family="monospace" font-size="8.5" fill="#f97316">SwiGLU FFN:</text>
  <text x="535" y="391" font-family="monospace" font-size="8.5" fill="#ccc">  (SiLU(xW₁) ⊙ xW₂)W₃</text>
  <text x="535" y="406" font-family="monospace" font-size="8.5" fill="#22c55e">Residual:</text>
  <text x="535" y="419" font-family="monospace" font-size="8.5" fill="#ccc">  x ← x + sublayer(x)</text>
  <text x="535" y="434" font-family="monospace" font-size="8.5" fill="#555">  (prevents vanishing gradients)</text>
  <text x="535" y="448" font-family="monospace" font-size="8.5" fill="#555">  (allows training 100+ layers)</text>
</svg>
