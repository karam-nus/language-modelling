title: "Language Modelling — The Complete Guide"
description: "From Tokens to Frontier: Understanding, Building, and Deploying Large Language Models. A comprehensive learning path for ML practitioners."
baseurl: "/language-modelling"
url: "https://karam-nus.github.io"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: false

include:
  - README.md

