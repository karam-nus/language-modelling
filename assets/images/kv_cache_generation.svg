<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" width="780" height="400" style="background:#111111;">
  <defs>
    <marker id="arrb" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrc" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="22" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#6b7280" letter-spacing="1">KV-CACHE — TOKEN GENERATION</text>

  <!-- Step labels -->
  <text x="90" y="46" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#3b82f6">Step 1</text>
  <text x="90" y="59" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">Prefill:  "The cat"</text>

  <text x="310" y="46" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#a855f7">Step 2</text>
  <text x="310" y="59" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">Generate:  "sat"</text>

  <text x="530" y="46" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#f97316">Step 3</text>
  <text x="530" y="59" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#555">Generate:  "on"</text>

  <!-- Step 1 -->
  <!-- Input tokens -->
  <rect x="30" y="68" width="50" height="22" rx="3" fill="#0f1520" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="55" y="83" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">The</text>
  <rect x="86" y="68" width="50" height="22" rx="3" fill="#0f1520" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="111" y="83" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6">cat</text>

  <!-- Transformer -->
  <line x1="90" y1="90" x2="90" y2="108" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrb)"/>
  <rect x="30" y="109" width="120" height="26" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="90" y="126" text-anchor="middle" font-family="monospace" font-size="9" fill="#999">Transformer</text>

  <!-- KV cache stored -->
  <line x1="90" y1="135" x2="90" y2="153" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrb)"/>

  <!-- KV Cache box step 1 -->
  <rect x="18" y="154" width="144" height="56" rx="4" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="90" y="172" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#22c55e">KV Cache</text>
  <text x="34" y="188" font-family="monospace" font-size="8" fill="#22c55e">K: [The] [cat]</text>
  <text x="34" y="200" font-family="monospace" font-size="8" fill="#22c55e">V: [The] [cat]</text>

  <!-- Next token output -->
  <line x1="90" y1="210" x2="90" y2="228" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrb)"/>
  <rect x="55" y="229" width="70" height="22" rx="3" fill="#1c0e00" stroke="#f97316" stroke-width="1.2"/>
  <text x="90" y="244" text-anchor="middle" font-family="monospace" font-size="9" fill="#f97316">"sat" →</text>

  <!-- Step 2 -->
  <!-- Only new token fed -->
  <rect x="250" y="68" width="50" height="22" rx="3" fill="#1a0a2a" stroke="#a855f7" stroke-width="1.2"/>
  <text x="275" y="83" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7">sat</text>
  <text x="340" y="78" text-anchor="start" font-family="monospace" font-size="8" fill="#555">(only new token)</text>

  <line x1="310" y1="90" x2="310" y2="108" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrb)"/>
  <rect x="250" y="109" width="120" height="26" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="310" y="126" text-anchor="middle" font-family="monospace" font-size="9" fill="#999">Transformer</text>

  <!-- Reuse cached KV -->
  <rect x="238" y="154" width="144" height="56" rx="4" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="310" y="172" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#22c55e">KV Cache  (growing)</text>
  <text x="254" y="188" font-family="monospace" font-size="8" fill="#22c55e">K: [The][cat][sat]</text>
  <text x="254" y="200" font-family="monospace" font-size="8" fill="#22c55e">V: [The][cat][sat]</text>

  <!-- Arrow from step1 cache to transformer (reuse) -->
  <line x1="162" y1="182" x2="237" y2="182" stroke="#22c55e" stroke-width="1.3" stroke-dasharray="4,2" marker-end="url(#arrc)"/>
  <text x="200" y="177" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#22c55e">reuse</text>

  <line x1="310" y1="135" x2="310" y2="153" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrb)"/>

  <line x1="310" y1="210" x2="310" y2="228" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrb)"/>
  <rect x="275" y="229" width="70" height="22" rx="3" fill="#1c0e00" stroke="#f97316" stroke-width="1.2"/>
  <text x="310" y="244" text-anchor="middle" font-family="monospace" font-size="9" fill="#f97316">"on" →</text>

  <!-- Step 3 -->
  <rect x="470" y="68" width="50" height="22" rx="3" fill="#1c0e00" stroke="#f97316" stroke-width="1.2"/>
  <text x="495" y="83" text-anchor="middle" font-family="monospace" font-size="9" fill="#f97316">on</text>
  <text x="560" y="78" text-anchor="start" font-family="monospace" font-size="8" fill="#555">(only new token)</text>

  <line x1="530" y1="90" x2="530" y2="108" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrb)"/>
  <rect x="470" y="109" width="120" height="26" rx="4" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="530" y="126" text-anchor="middle" font-family="monospace" font-size="9" fill="#999">Transformer</text>

  <rect x="458" y="154" width="144" height="56" rx="4" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="530" y="172" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#22c55e">KV Cache  (growing)</text>
  <text x="474" y="188" font-family="monospace" font-size="8" fill="#22c55e">K: [The][cat][sat][on]</text>
  <text x="474" y="200" font-family="monospace" font-size="8" fill="#22c55e">V: [The][cat][sat][on]</text>

  <line x1="382" y1="182" x2="457" y2="182" stroke="#22c55e" stroke-width="1.3" stroke-dasharray="4,2" marker-end="url(#arrc)"/>
  <text x="420" y="177" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#22c55e">reuse</text>

  <line x1="530" y1="135" x2="530" y2="153" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrb)"/>

  <line x1="530" y1="210" x2="530" y2="228" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrb)"/>
  <rect x="487" y="229" width="86" height="22" rx="3" fill="#1c0e00" stroke="#f97316" stroke-width="1.2"/>
  <text x="530" y="244" text-anchor="middle" font-family="monospace" font-size="9" fill="#f97316">"the" →  ···</text>

  <!-- Memory calculation panel -->
  <rect x="18" y="275" width="744" height="108" rx="6" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="390" y="295" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#6b7280" letter-spacing="0.5">KV CACHE MEMORY  (per token, FP16)</text>

  <text x="35" y="315" font-family="monospace" font-size="9" fill="#555">Formula:</text>
  <text x="35" y="330" font-family="monospace" font-size="9" fill="#ccc">  KV bytes = 2 (K+V) × n_layers × n_kv_heads × d_head × 2 bytes (FP16) × seq_len</text>

  <text x="35" y="352" font-family="monospace" font-size="8.5" fill="#3b82f6">LLaMA-3-8B   (32 layers, 8 KV heads, d_head=128):</text>
  <text x="35" y="366" font-family="monospace" font-size="8.5" fill="#ccc">  2 × 32 × 8 × 128 × 2 = 131,072 bytes/token ≈ 128 KB/token</text>
  <text x="420" y="366" font-family="monospace" font-size="8.5" fill="#555">→  1K tokens ≈ 128 MB,  100K tokens ≈ 12.5 GB</text>
</svg>
